<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pulse - Voice Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Authentication Screen -->
    <div id="authScreen" class="screen active">
        <div class="auth-container">
            <div class="auth-header">
                <div class="pulse-logo">
                    <span class="logo-dot"></span>
                    <span class="logo-text">Pulse</span>
                </div>
                <p class="auth-subtitle">Connect with friends in real-time</p>
            </div>
            
            <button id="googleSignInBtn" class="google-signin-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>
            
            <div class="auth-footer">
                <p>Firebase-powered voice & messaging platform</p>
            </div>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="appScreen" class="screen">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <h1 class="app-title">Pulse</h1>
                <span class="user-status" id="userStatus">Loading...</span>
            </div>
            <button id="signOutBtn" class="sign-out-btn">Sign Out</button>
        </header>

        <!-- Main Content Grid -->
        <div class="app-container">
            <!-- Friends List -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>Friends</h2>
                    <button id="addFriendBtn" class="add-btn" title="Add Friend">+</button>
                </div>
                <div id="friendsList" class="friends-list">
                    <div class="empty-state">No friends yet</div>
                </div>
            </aside>

            <!-- Chat & Voice Section -->
            <main class="main-content">
                <!-- Empty State -->
                <div id="emptyState" class="empty-state-container">
                    <div class="empty-illustration">
                        <div class="pulse-ring"></div>
                    </div>
                    <h2>Select a friend to chat</h2>
                    <p>Or create a voice room to connect</p>
                </div>

                <!-- Chat View -->
                <div id="chatView" class="chat-view hidden">
                    <div class="chat-header">
                        <div class="chat-user-info">
                            <h3 id="chatUserName">Friend</h3>
                            <span id="chatUserStatus" class="status-indicator"></span>
                        </div>
                        <div class="chat-actions">
                            <button id="voiceCallBtn" class="action-btn voice-btn" title="Start Voice Call">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div id="messagesContainer" class="messages-container">
                        <!-- Messages will be inserted here -->
                    </div>

                    <div class="message-input-area">
                        <input 
                            id="messageInput" 
                            type="text" 
                            placeholder="Type a message..." 
                            class="message-input"
                            autocomplete="off"
                        >
                        <button id="sendMessageBtn" class="send-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.99 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 L4.13399899,1.01727519 C3.34915502,0.9062858 2.40734225,1.01727519 1.77946707,1.4885637 C0.994623095,2.1074379 0.837654326,3.05 1.15159189,3.99844556 L3.03521743,10.4394242 C3.03521743,10.5965216 3.19218622,10.7536191 3.50612381,10.7536191 L16.6915026,11.5391059 C16.6915026,11.5391059 17.1624089,11.5391059 17.1624089,12.0103975 C17.1624089,12.4816891 16.6915026,12.4744748 16.6915026,12.4744748 Z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Voice Room View -->
                <div id="voiceView" class="voice-view hidden">
                    <div class="voice-header">
                        <button id="closeVoiceBtn" class="close-voice-btn">← Back</button>
                        <h2 id="voiceRoomTitle">Voice Chat</h2>
                    </div>
                    
                    <div class="voice-container">
                        <div class="participants-grid" id="participantsGrid">
                            <div class="participant-card">
                                <div class="participant-avatar" id="currentUserAvatar">You</div>
                                <div class="participant-info">
                                    <p id="currentUserNameVoice">You</p>
                                    <div class="voice-indicator">
                                        <div class="bar" style="animation-delay: 0s;"></div>
                                        <div class="bar" style="animation-delay: 0.1s;"></div>
                                        <div class="bar" style="animation-delay: 0.2s;"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="voice-controls">
                            <button id="muteBtn" class="control-btn mute-btn" title="Mute">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                                    <path d="M17 16.91c-1.48 1.46-3.51 2.36-5.77 2.36-2.26 0-4.29-.9-5.77-2.36l-1.1 1.1c1.86 1.86 4.41 3 7.07 3s5.21-1.14 7.07-3l-1.1-1.1zM21 12h-2.13c0 .74-.16 1.43-.43 2.05l1.5 1.5c.56-1.27.86-2.67.86-4.05zm-7-8h-2v7h2V4z"/>
                                </svg>
                            </button>
                            <button id="leaveVoiceBtn" class="control-btn leave-btn" title="Leave">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M19.59 7c0-1.05.93-1.89 2.02-1.89 1.1 0 1.99.84 1.99 1.89v10c0 1.05-.89 1.89-1.99 1.89-1.09 0-2.02-.84-2.02-1.89m-15.01-4c0 2.21 1.79 4 4 4s4-1.79 4-4-1.79-4-4-4-4 1.79-4 4zm0 6.5c0 2.49 2.01 4.5 4.5 4.5s4.5-2.01 4.5-4.5"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modals -->
    <!-- Add Friend Modal -->
    <div id="addFriendModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Friend</h2>
                <button class="modal-close" id="closeFriendModal">&times;</button>
            </div>
            <input 
                id="friendEmailInput" 
                type="email" 
                placeholder="Enter friend's email" 
                class="modal-input"
            >
            <button id="addFriendSubmitBtn" class="modal-submit">Add Friend</button>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Firebase SDK - load first -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-analytics.js"></script>
    
    <!-- App scripts - load in order -->
    <script src="auth.js"></script>
    <script src="chat.js"></script>
    <script src="app.js"></script>
</body>
</html>
