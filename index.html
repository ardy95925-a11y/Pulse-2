<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pulse - Voice Chat</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --border: #475569;
            --success: #10b981;
            --danger: #ef4444;
            --accent: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* ========== SCREENS ========== */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease-in-out;
        }

        .screen.active {
            opacity: 1;
            pointer-events: all;
        }

        /* ========== AUTHENTICATION ========== */
        #authScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        }

        .auth-container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            margin-bottom: 3rem;
        }

        .pulse-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .logo-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--primary);
            animation: pulse-animation 2s ease-in-out infinite;
        }

        @keyframes pulse-animation {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(99, 102, 241, 0);
            }
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .google-signin-btn {
            width: 100%;
            padding: 1.5rem;
            border: 1px solid var(--border);
            border-radius: 1rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            transition: all 0.3s;
            margin-bottom: 2rem;
        }

        .google-signin-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.2);
        }

        .google-signin-btn:active {
            transform: translateY(0);
        }

        .google-signin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-footer {
            color: var(--text-tertiary);
            font-size: 0.85rem;
            margin-top: 2rem;
        }

        /* ========== APP HEADER ========== */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            height: 70px;
        }

        .header-left {
            display: flex;
            align-items: baseline;
            gap: 1.5rem;
        }

        .app-title {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .user-status {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .sign-out-btn {
            padding: 0.6rem 1.2rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .sign-out-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* ========== APP CONTAINER ========== */
        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: calc(100vh - 70px);
            gap: 0;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow-y: auto;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg-secondary);
            z-index: 10;
        }

        .sidebar-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .add-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .add-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .friends-list {
            flex: 1;
            overflow-y: auto;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 150px;
            color: var(--text-tertiary);
            font-size: 0.9rem;
            text-align: center;
            padding: 1.5rem;
        }

        .friend-item {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .friend-item:hover {
            background: var(--bg-tertiary);
        }

        .friend-item.active {
            background: var(--primary);
            border-left: 3px solid var(--primary-light);
            padding-left: calc(1.5rem - 3px);
        }

        .friend-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .friend-info {
            flex: 1;
            min-width: 0;
        }

        .friend-name {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .friend-status {
            font-size: 0.8rem;
            color: var(--text-tertiary);
        }

        .online-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            margin-left: auto;
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            position: relative;
        }

        .empty-state-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 2rem;
            color: var(--text-tertiary);
        }

        .empty-illustration {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pulse-ring {
            width: 60px;
            height: 60px;
            border: 3px solid var(--primary);
            border-radius: 50%;
            animation: expand 2s ease-in-out infinite;
        }

        @keyframes expand {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }

        .empty-state-container h2 {
            font-size: 1.3rem;
            color: var(--text-primary);
        }

        /* ========== CHAT VIEW ========== */
        .chat-view {
            display: flex;
            flex-direction: column;
            height: 100%;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .hidden {
            display: none !important;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .chat-user-info h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .status-indicator {
            font-size: 0.8rem;
            color: var(--text-tertiary);
        }

        .chat-actions {
            display: flex;
            gap: 1rem;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 0.75rem;
            background: var(--bg-tertiary);
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: var(--primary);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 1rem;
            animation: slideUp 0.3s ease-out;
        }

        .message.own {
            flex-direction: row-reverse;
        }

        .message-bubble {
            max-width: 70%;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message-bubble.own {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 0.5rem;
        }

        .message-bubble.other {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-bottom-left-radius: 0.5rem;
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-top: 0.25rem;
            text-align: center;
        }

        .message-input-area {
            display: flex;
            gap: 1rem;
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .message-input {
            flex: 1;
            padding: 1rem 1.5rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .message-input:focus {
            border-color: var(--primary);
            background: var(--bg-primary);
        }

        .message-input::placeholder {
            color: var(--text-tertiary);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 1rem;
            background: var(--primary);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .send-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        /* ========== VOICE VIEW ========== */
        .voice-view {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .voice-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .close-voice-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .close-voice-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .voice-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            gap: 2rem;
        }

        .participants-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 2rem;
            align-content: start;
        }

        .participant-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            animation: slideUp 0.4s ease-out;
        }

        .participant-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
        }

        .participant-info {
            text-align: center;
        }

        .participant-info p {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .voice-indicator {
            display: flex;
            gap: 4px;
            justify-content: center;
        }

        .bar {
            width: 4px;
            height: 20px;
            background: var(--primary);
            border-radius: 2px;
            animation: audioBar 0.5s ease-in-out infinite;
        }

        @keyframes audioBar {
            0%, 100% { height: 8px; }
            50% { height: 20px; }
        }

        .voice-controls {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mute-btn {
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            color: var(--text-primary);
        }

        .mute-btn:hover {
            border-color: var(--primary);
        }

        .mute-btn.active {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }

        .leave-btn {
            background: var(--danger);
            color: white;
        }

        .leave-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        /* ========== MODALS ========== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.2s ease-out;
        }

        .modal.hidden {
            display: none;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            animation: slideUp 0.3s ease-out;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .modal-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .modal-close {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-input {
            width: 100%;
            padding: 1.5rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: var(--text-primary);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            outline: none;
            transition: all 0.3s;
        }

        .modal-input:focus {
            border-color: var(--primary);
            background: var(--bg-primary);
        }

        .modal-submit {
            width: 100%;
            padding: 1.5rem;
            background: var(--primary);
            border: none;
            border-radius: 0.75rem;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-submit:hover {
            background: var(--primary-dark);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }
    </style>
</head>
<body>
    <!-- Authentication Screen -->
    <div id="authScreen" class="screen active">
        <div class="auth-container">
            <div class="auth-header">
                <div class="pulse-logo">
                    <span class="logo-dot"></span>
                    <span class="logo-text">Pulse</span>
                </div>
                <p class="auth-subtitle">Connect with friends in real-time</p>
            </div>
            
            <button id="googleSignInBtn" class="google-signin-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>
            
            <div class="auth-footer">
                <p>Firebase-powered voice & messaging platform</p>
            </div>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="appScreen" class="screen">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <h1 class="app-title">Pulse</h1>
                <span class="user-status" id="userStatus">Loading...</span>
            </div>
            <button id="signOutBtn" class="sign-out-btn">Sign Out</button>
        </header>

        <!-- Main Content Grid -->
        <div class="app-container">
            <!-- Friends List -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>Friends</h2>
                    <button id="addFriendBtn" class="add-btn" title="Add Friend">+</button>
                </div>
                <div id="friendsList" class="friends-list">
                    <div class="empty-state">No friends yet</div>
                </div>
            </aside>

            <!-- Chat & Voice Section -->
            <main class="main-content">
                <!-- Empty State -->
                <div id="emptyState" class="empty-state-container">
                    <div class="empty-illustration">
                        <div class="pulse-ring"></div>
                    </div>
                    <h2>Select a friend to chat</h2>
                    <p>Or create a voice room to connect</p>
                </div>

                <!-- Chat View -->
                <div id="chatView" class="chat-view hidden">
                    <div class="chat-header">
                        <div class="chat-user-info">
                            <h3 id="chatUserName">Friend</h3>
                            <span id="chatUserStatus" class="status-indicator"></span>
                        </div>
                        <div class="chat-actions">
                            <button id="voiceCallBtn" class="action-btn voice-btn" title="Start Voice Call">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div id="messagesContainer" class="messages-container">
                        <!-- Messages will be inserted here -->
                    </div>

                    <div class="message-input-area">
                        <input 
                            id="messageInput" 
                            type="text" 
                            placeholder="Type a message..." 
                            class="message-input"
                            autocomplete="off"
                        >
                        <button id="sendMessageBtn" class="send-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.99 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 L4.13399899,1.01727519 C3.34915502,0.9062858 2.40734225,1.01727519 1.77946707,1.4885637 C0.994623095,2.1074379 0.837654326,3.05 1.15159189,3.99844556 L3.03521743,10.4394242 C3.03521743,10.5965216 3.19218622,10.7536191 3.50612381,10.7536191 L16.6915026,11.5391059 C16.6915026,11.5391059 17.1624089,11.5391059 17.1624089,12.0103975 C17.1624089,12.4816891 16.6915026,12.4744748 16.6915026,12.4744748 Z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Voice Room View -->
                <div id="voiceView" class="voice-view hidden">
                    <div class="voice-header">
                        <button id="closeVoiceBtn" class="close-voice-btn">← Back</button>
                        <h2 id="voiceRoomTitle">Voice Chat</h2>
                    </div>
                    
                    <div class="voice-container">
                        <div class="participants-grid" id="participantsGrid">
                            <div class="participant-card">
                                <div class="participant-avatar">You</div>
                                <div class="participant-info">
                                    <p>You</p>
                                    <div class="voice-indicator">
                                        <div class="bar" style="animation-delay: 0s;"></div>
                                        <div class="bar" style="animation-delay: 0.1s;"></div>
                                        <div class="bar" style="animation-delay: 0.2s;"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="voice-controls">
                            <button id="muteBtn" class="control-btn mute-btn" title="Mute">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                                    <path d="M17 16.91c-1.48 1.46-3.51 2.36-5.77 2.36-2.26 0-4.29-.9-5.77-2.36l-1.1 1.1c1.86 1.86 4.41 3 7.07 3s5.21-1.14 7.07-3l-1.1-1.1zM21 12h-2.13c0 .74-.16 1.43-.43 2.05l1.5 1.5c.56-1.27.86-2.67.86-4.05zm-7-8h-2v7h2V4z"/>
                                </svg>
                            </button>
                            <button id="leaveVoiceBtn" class="control-btn leave-btn" title="Leave">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M19.59 7c0-1.05.93-1.89 2.02-1.89 1.1 0 1.99.84 1.99 1.89v10c0 1.05-.89 1.89-1.99 1.89-1.09 0-2.02-.84-2.02-1.89m-15.01-4c0 2.21 1.79 4 4 4s4-1.79 4-4-1.79-4-4-4-4 1.79-4 4zm0 6.5c0 2.49 2.01 4.5 4.5 4.5s4.5-2.01 4.5-4.5"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add Friend Modal -->
    <div id="addFriendModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Friend</h2>
                <button class="modal-close" id="closeFriendModal">&times;</button>
            </div>
            <input 
                id="friendEmailInput" 
                type="email" 
                placeholder="Enter friend's email" 
                class="modal-input"
            >
            <button id="addFriendSubmitBtn" class="modal-submit">Add Friend</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js"></script>

    <!-- Application Script -->
    <script>
        // ==================== FIREBASE INITIALIZATION ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCW6Utclu2ME1z1AwUj2xwTm_-it-aWFrI",
            authDomain: "pulse-c5322.firebaseapp.com",
            projectId: "pulse-c5322",
            storageBucket: "pulse-c5322.firebasestorage.app",
            messagingSenderId: "700936968948",
            appId: "1:700936968948:web:abe29f631b258516551ca1",
            measurementId: "G-LPHD13EJQP"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const firestore = firebase.firestore();

        console.log("✓ Firebase initialized");

        // ==================== STATE ====================
        let currentSelectedFriend = null;
        let currentVoiceRoom = null;
        let muteState = false;
        let messagesUnsubscribe = null;
        let friendsUnsubscribe = null;

        // ==================== DOM ELEMENTS ====================
        const authScreen = document.getElementById('authScreen');
        const appScreen = document.getElementById('appScreen');
        const googleSignInBtn = document.getElementById('googleSignInBtn');
        const signOutBtn = document.getElementById('signOutBtn');
        const userStatus = document.getElementById('userStatus');
        const friendsList = document.getElementById('friendsList');
        const chatView = document.getElementById('chatView');
        const voiceView = document.getElementById('voiceView');
        const emptyState = document.getElementById('emptyState');
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendMessageBtn = document.getElementById('sendMessageBtn');
        const chatUserName = document.getElementById('chatUserName');
        const chatUserStatus = document.getElementById('chatUserStatus');
        const voiceCallBtn = document.getElementById('voiceCallBtn');
        const muteBtn = document.getElementById('muteBtn');
        const leaveVoiceBtn = document.getElementById('leaveVoiceBtn');
        const closeVoiceBtn = document.getElementById('closeVoiceBtn');
        const addFriendBtn = document.getElementById('addFriendBtn');
        const addFriendModal = document.getElementById('addFriendModal');
        const friendEmailInput = document.getElementById('friendEmailInput');
        const addFriendSubmitBtn = document.getElementById('addFriendSubmitBtn');
        const closeFriendModal = document.getElementById('closeFriendModal');

        // ==================== AUTHENTICATION ====================

        const signInWithGoogle = async () => {
            try {
                console.log("Attempting Google sign-in...");
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.addScope('profile');
                provider.addScope('email');

                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                console.log("✓ Sign-in successful:", user.email);

                // Save user to Firestore
                await firestore.collection("users").doc(user.uid).set({
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName || "User",
                    photoURL: user.photoURL || "",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                    status: "online"
                }, { merge: true });

                console.log("✓ User saved to Firestore");
                return user;
            } catch (error) {
                console.error("✗ Sign-in error:", error);
                throw error;
            }
        };

        const logoutUser = async () => {
            try {
                if (auth.currentUser) {
                    await firestore.collection("users").doc(auth.currentUser.uid).update({
                        status: "offline",
                        lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                await auth.signOut();
                console.log("✓ Logout successful");
            } catch (error) {
                console.error("✗ Logout error:", error);
                throw error;
            }
        };

        const updateAuthUI = (user) => {
            if (user) {
                authScreen.classList.remove('active');
                appScreen.classList.add('active');
                userStatus.textContent = `Welcome, ${user.displayName || user.email}`;
                loadFriends(user.uid);
                console.log("✓ Switched to app screen");
            } else {
                appScreen.classList.remove('active');
                authScreen.classList.add('active');
                userStatus.textContent = 'Not logged in';
                console.log("✓ Switched to auth screen");
            }
        };

        // Set persistence
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(err => {
            console.error("Persistence error:", err);
        });

        // Auth state listener
        auth.onAuthStateChanged(user => {
            console.log("Auth state changed:", user ? user.email : "not logged in");
            updateAuthUI(user);
        });

        // ==================== FRIENDS ====================

        const loadFriends = async (userId) => {
            console.log("Loading friends for:", userId);
            if (friendsUnsubscribe) friendsUnsubscribe();

            friendsUnsubscribe = firestore.collection("relationships")
                .where("userId", "==", userId)
                .where("status", "==", "accepted")
                .onSnapshot(snapshot => {
                    console.log("Friends loaded:", snapshot.size);
                    renderFriendsList(snapshot.docs, userId);
                }, error => {
                    console.error("Error loading friends:", error);
                });
        };

        const renderFriendsList = async (friendDocs, userId) => {
            friendsList.innerHTML = '';

            if (friendDocs.length === 0) {
                friendsList.innerHTML = '<div class="empty-state">No friends yet. Add one!</div>';
                return;
            }

            for (const doc of friendDocs) {
                const friendId = doc.data().friendId;
                try {
                    const friendSnap = await firestore.collection("users").doc(friendId).get();

                    if (friendSnap.exists()) {
                        const friendData = friendSnap.data();
                        const isActive = currentSelectedFriend?.uid === friendId;

                        const friendElement = document.createElement('div');
                        friendElement.className = `friend-item ${isActive ? 'active' : ''}`;
                        friendElement.innerHTML = `
                            <div class="friend-avatar">${friendData.displayName?.charAt(0).toUpperCase() || 'U'}</div>
                            <div class="friend-info">
                                <div class="friend-name">${friendData.displayName || friendData.email}</div>
                                <div class="friend-status">${friendData.status || 'offline'}</div>
                            </div>
                            ${friendData.status === 'online' ? '<div class="online-indicator"></div>' : ''}
                        `;

                        friendElement.addEventListener('click', () => selectFriend(friendId, friendData));
                        friendsList.appendChild(friendElement);
                    }
                } catch (error) {
                    console.error("Error loading friend:", error);
                }
            }
        };

        const addFriend = async (friendEmail, userId) => {
            try {
                console.log("Adding friend:", friendEmail);
                const userDocs = await firestore.collection("users")
                    .where("email", "==", friendEmail)
                    .get();

                if (userDocs.empty) {
                    alert('User not found');
                    return;
                }

                const friendId = userDocs.docs[0].id;

                if (friendId === userId) {
                    alert('Cannot add yourself as a friend');
                    return;
                }

                // Create relationship both ways
                await firestore.collection("relationships").doc(`${userId}_${friendId}`).set({
                    userId: userId,
                    friendId: friendId,
                    status: "accepted",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                await firestore.collection("relationships").doc(`${friendId}_${userId}`).set({
                    userId: friendId,
                    friendId: userId,
                    status: "accepted",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                console.log("✓ Friend added:", friendEmail);
                alert('Friend added successfully!');
                closeAddFriendModal();
            } catch (error) {
                console.error("Error adding friend:", error);
                alert('Failed to add friend: ' + error.message);
            }
        };

        // ==================== MESSAGES ====================

        const selectFriend = (friendId, friendData) => {
            console.log("Selected friend:", friendData.email);
            currentSelectedFriend = { uid: friendId, ...friendData };

            document.querySelectorAll('.friend-item').forEach(el => el.classList.remove('active'));
            event.currentTarget?.classList.add('active');

            emptyState.classList.add('hidden');
            chatView.classList.remove('hidden');
            voiceView.classList.add('hidden');

            chatUserName.textContent = friendData.displayName || friendData.email;
            chatUserStatus.textContent = friendData.status === 'online' ? '● Online' : '● Offline';

            loadMessages(auth.currentUser.uid, friendId);
        };

        const loadMessages = (userId, friendId) => {
            console.log("Loading messages with:", friendId);
            if (messagesUnsubscribe) messagesUnsubscribe();

            const conversationId = [userId, friendId].sort().join('_');

            messagesUnsubscribe = firestore.collection("messages")
                .where("conversationId", "==", conversationId)
                .orderBy("timestamp", "asc")
                .limit(50)
                .onSnapshot(snapshot => {
                    console.log("Messages loaded:", snapshot.size);
                    renderMessages(snapshot.docs, userId);
                }, error => {
                    console.error("Error loading messages:", error);
                });
        };

        const renderMessages = (messageDocs, userId) => {
            messagesContainer.innerHTML = '';

            messageDocs.forEach(doc => {
                const data = doc.data();
                const isOwn = data.senderId === userId;

                const messageElement = document.createElement('div');
                messageElement.className = `message ${isOwn ? 'own' : ''}`;

                const timestamp = data.timestamp?.toDate?.() || new Date();
                const timeString = timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                messageElement.innerHTML = `
                    <div class="message-bubble ${isOwn ? 'own' : 'other'}">
                        ${escapeHtml(data.text)}
                    </div>
                    <div class="message-time">${timeString}</div>
                `;

                messagesContainer.appendChild(messageElement);
            });

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        };

        const sendMessage = async (text) => {
            if (!text.trim() || !currentSelectedFriend) return;

            try {
                const userId = auth.currentUser.uid;
                const friendId = currentSelectedFriend.uid;
                const conversationId = [userId, friendId].sort().join('_');

                console.log("Sending message...");
                await firestore.collection("messages").add({
                    conversationId: conversationId,
                    senderId: userId,
                    senderName: auth.currentUser.displayName || auth.currentUser.email,
                    text: text.trim(),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                messageInput.value = '';
                messageInput.focus();
                console.log("✓ Message sent");
            } catch (error) {
                console.error("Error sending message:", error);
                alert('Failed to send message: ' + error.message);
            }
        };

        // ==================== VOICE ====================

        const startVoiceCall = async () => {
            if (!currentSelectedFriend) return;

            try {
                console.log("Starting voice call...");
                const userId = auth.currentUser.uid;
                const friendId = currentSelectedFriend.uid;
                const roomId = [userId, friendId].sort().join('_') + '_' + Date.now();

                await firestore.collection("voiceRooms").doc(roomId).set({
                    roomId: roomId,
                    initiator: userId,
                    participants: [userId, friendId],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    active: true
                });

                currentVoiceRoom = roomId;
                enterVoiceRoom(roomId);
                console.log("✓ Voice room created:", roomId);
            } catch (error) {
                console.error("Error starting voice call:", error);
                alert('Failed to start voice call: ' + error.message);
            }
        };

        const enterVoiceRoom = (roomId) => {
            chatView.classList.add('hidden');
            voiceView.classList.remove('hidden');

            document.getElementById('voiceRoomTitle').textContent = `Voice Chat with ${currentSelectedFriend.displayName}`;

            const participantsGrid = document.getElementById('participantsGrid');
            participantsGrid.innerHTML = `
                <div class="participant-card">
                    <div class="participant-avatar">${auth.currentUser.displayName?.charAt(0).toUpperCase() || 'Y'}</div>
                    <div class="participant-info">
                        <p>${auth.currentUser.displayName || 'You'}</p>
                        <div class="voice-indicator">
                            <div class="bar" style="animation-delay: 0s;"></div>
                            <div class="bar" style="animation-delay: 0.1s;"></div>
                            <div class="bar" style="animation-delay: 0.2s;"></div>
                        </div>
                    </div>
                </div>
                <div class="participant-card">
                    <div class="participant-avatar">${currentSelectedFriend.displayName?.charAt(0).toUpperCase() || 'F'}</div>
                    <div class="participant-info">
                        <p>${currentSelectedFriend.displayName}</p>
                        <div class="voice-indicator">
                            <div class="bar" style="animation-delay: 0s;"></div>
                            <div class="bar" style="animation-delay: 0.1s;"></div>
                            <div class="bar" style="animation-delay: 0.2s;"></div>
                        </div>
                    </div>
                </div>
            `;
        };

        const leaveVoiceCall = async () => {
            if (!currentVoiceRoom) return;

            try {
                await firestore.collection("voiceRooms").doc(currentVoiceRoom).update({
                    active: false
                });

                currentVoiceRoom = null;
                muteState = false;

                voiceView.classList.add('hidden');
                chatView.classList.remove('hidden');
                console.log("✓ Left voice call");
            } catch (error) {
                console.error("Error leaving voice call:", error);
            }
        };

        const toggleMute = () => {
            muteState = !muteState;
            muteBtn.classList.toggle('active', muteState);
            console.log("Mute:", muteState ? "ON" : "OFF");
        };

        // ==================== EVENT LISTENERS ====================

        googleSignInBtn.addEventListener('click', async () => {
            console.log("Google sign-in button clicked");
            googleSignInBtn.disabled = true;
            const originalText = googleSignInBtn.innerHTML;
            googleSignInBtn.innerHTML = '<span style="display: inline-block; margin-right: 8px;">⟳</span>Signing in...';

            try {
                await signInWithGoogle();
            } catch (error) {
                console.error("Sign-in failed:", error);
                googleSignInBtn.disabled = false;
                googleSignInBtn.innerHTML = originalText;

                let errorMessage = 'Sign-in failed';
                if (error.code === 'auth/operation-not-supported-in-this-environment') {
                    errorMessage = 'Please use HTTPS or localhost, not file://';
                } else if (error.message) {
                    errorMessage = error.message;
                }
                alert(errorMessage);
            }
        });

        signOutBtn.addEventListener('click', async () => {
            console.log("Sign-out button clicked");
            signOutBtn.disabled = true;

            try {
                await logoutUser();
            } catch (error) {
                console.error("Logout failed:", error);
                signOutBtn.disabled = false;
                alert('Logout failed: ' + error.message);
            }
        });

        sendMessageBtn.addEventListener('click', () => {
            sendMessage(messageInput.value);
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(messageInput.value);
            }
        });

        voiceCallBtn.addEventListener('click', startVoiceCall);
        leaveVoiceBtn.addEventListener('click', leaveVoiceCall);
        closeVoiceBtn.addEventListener('click', leaveVoiceCall);
        muteBtn.addEventListener('click', toggleMute);

        addFriendBtn.addEventListener('click', () => {
            addFriendModal.classList.remove('hidden');
            friendEmailInput.focus();
        });

        closeFriendModal.addEventListener('click', () => {
            addFriendModal.classList.add('hidden');
            friendEmailInput.value = '';
        });

        addFriendSubmitBtn.addEventListener('click', () => {
            if (friendEmailInput.value.trim()) {
                addFriend(friendEmailInput.value.trim(), auth.currentUser.uid);
            }
        });

        friendEmailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addFriendSubmitBtn.click();
            }
        });

        addFriendModal.addEventListener('click', (e) => {
            if (e.target === addFriendModal) {
                addFriendModal.classList.add('hidden');
            }
        });

        // ==================== UTILITIES ====================

        const escapeHtml = (text) => {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        };

        const closeAddFriendModal = () => {
            addFriendModal.classList.add('hidden');
            friendEmailInput.value = '';
        };

        console.log("✓ App initialized and ready!");
    </script>
</body>
</html>
